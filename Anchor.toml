[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
anchor_vault = "pWBqGdZX6SBeoTbnhrXx6MyrjFn3amzjgpsTCUMnfUm"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[test.validator]
bind_address = "127.0.0.1"
rpc_port = 8899
faucet_port = 9900
ledger = ".anchor-linux/ledger"
rpc_send_transaction_also_leader = true
startup_wait = 120

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
